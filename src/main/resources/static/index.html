<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>IT Support Tickets</title>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>IT Support Ticket System</h1>
            <p>Track, update, and manage support requests</p>
        </header>

        <section class="panel">
            <h2 id="formTitle">Create Ticket</h2>

            <form id="ticketForm">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" required>

                <label for="description">Description:</label>
                <textarea id="description" name="description" required></textarea>

                <label for="submittedBy">Submitted By:</label>
                <textarea type="text" id="submittedBy" name="submittedBy" required></textarea>

                <label for="status">Status:</label>
                <select id="status" name="status">
                    <option value="OPEN">OPEN</option>
                    <option value="IN_PROGRESS">IN PROGRESS</option>
                    <option value="CLOSED">CLOSED</option>
                </select>

                <label for="priority">Status:</label>
                <select id="priority" name="priority">
                    <option value="LOW">LOW</option>
                    <option value="MEDIUM">MEDIUM</option>
                    <option value="HIGH">HIGH</option>
                </select>

                <button type="submit" id="submitBtn">Create Ticket</button>
            </form>
        </section>

        <section class="panel">
            <div class="section-header">
                <h2>All Tickets</h2>
                <button id="loadTicketsBtn">Refresh Tickets</button>
            </div>

            <div id="ticketList"></div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
